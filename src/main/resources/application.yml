spring:
  application:
    name: bittorrent-client
  datasource:
    url: jdbc:postgresql://localhost:5432/bittorrent
    username: ${DB_USER:bittorrent}
    password: ${DB_PASS:bittorrent}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
